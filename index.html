<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liz Lifestyle | Premium Fashion & Elegant Apparel</title>
    <meta name="description" content="Shop the latest in premium fashion at Liz Lifestyle. Discover elegant dresses, contemporary wear, and exclusive collections designed for the modern woman. Quality and elegance in every thread." />
    <meta name="keywords" content="premium fashion, elegant dresses, Liz Lifestyle, clothing store, designer apparel, luxury wear, fashion boutique" />
    <link rel="canonical" href="https://lizlifestyle.example.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Liz Lifestyle" />
    <meta property="og:title" content="Liz Lifestyle | Premium Fashion & Elegant Apparel" />
    <meta property="og:description" content="Discover curated collections of elegant apparel and luxury fashion. Experience excellence in every thread." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Liz Lifestyle | Premium Fashion & Elegant Apparel" />
    <meta name="twitter:description" content="Shop exclusive premium fashion and elegant collections at Liz Lifestyle." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Liz Lifestyle",
      "url": "https://lizlifestyle.example.com",
      "logo": "https://lizlifestyle.example.com/logo.png",
      "description": "Premium clothing storefront with exclusive collections and elegant apparel.",
      "image": "https://lizlifestyle.example.com/logo.png",
      "priceRange": "$$",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dhaka",
        "addressCountry": "BD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
